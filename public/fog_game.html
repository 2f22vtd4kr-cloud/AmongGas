<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fog — game-accurate render</title>
<style>
  body { margin:0; background:#1a0a2e; display:flex; gap:8px; padding:8px; flex-wrap:wrap; }
  .panel { display:flex; flex-direction:column; align-items:center; }
  h3 { color:#fff; font:bold 11px monospace; margin:2px 0; text-align:center; }
  canvas { border:1px solid #444; display:block; }
</style>
</head>
<body>
<script>
// ── Game constants (from settings.ts) ─────────────────────────────────────────
const CAMERA_ZOOM = 1.45;
const CREW_VISION = 200;   // world units
const GAME_W = 750, GAME_H = 1334;
const MAP_W = 5792, MAP_H = 3168;

const PLAYER = { x: 4528, y: 1712 };

// Wall rects near spawn, within 400 world units (from map_final.backv2.tmx)
const WALLS = [
  {"x":3409,"y":1357.67,"width":992,"height":193.33},
  {"x":4357.67,"y":1318,"width":99.3636,"height":809},
  {"x":4939.67,"y":1472,"width":341.364,"height":225.666},
  {"x":4657,"y":1680,"width":296,"height":312},
  {"x":4648,"y":2088,"width":192.333,"height":95},
  {"x":4392.67,"y":1318,"width":351.667,"height":170.333},
  {"x":4353,"y":2055,"width":56,"height":96},
  {"x":4265,"y":2143,"width":91,"height":40},
  {"x":4121,"y":1551,"width":40,"height":56},
  {"x":4233,"y":1967,"width":120,"height":48},
  {"x":4209,"y":1999,"width":112,"height":48},
  {"x":4185,"y":2023,"width":112,"height":48},
  {"x":4161,"y":2047,"width":112,"height":48},
  {"x":4257,"y":1551,"width":96,"height":416},
  {"x":4819.67,"y":1943,"width":51.3636,"height":310.666},
  {"x":3538,"y":2059,"width":815,"height":84},
];

// ── Visibility algorithm ──────────────────────────────────────────────────────
function raySegT(ox,oy,dx,dy,ax,ay,bx,by){
  const rx=bx-ax,ry=by-ay,d=dx*ry-dy*rx;
  if(Math.abs(d)<1e-10)return null;
  const t=((ax-ox)*ry-(ay-oy)*rx)/d,u=((ax-ox)*dy-(ay-oy)*dx)/d;
  if(t<-1e-10||u<-1e-10||u>1+1e-10)return null;
  return t;
}
function circleAngles(px,py,r,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,ex=ax-px,ey=ay-py,a=dx*dx+dy*dy;
  if(a<1e-10)return[];
  const b=2*(ex*dx+ey*dy),c=ex*ex+ey*ey-r*r,disc=b*b-4*a*c;
  if(disc<0)return[];
  const sq=Math.sqrt(disc),out=[];
  for(const t of[(-b-sq)/(2*a),(-b+sq)/(2*a)]){
    if(t>1e-6&&t<1+1e-6){const tt=Math.min(t,1);out.push(Math.atan2(ay+tt*dy-py,ax+tt*dx-px));}
  }
  return out;
}
function computePoly(px,py,radius,walls){
  const r15sq=radius*radius*2.25;
  const nearby=walls.filter(w=>{
    const cx=Math.max(w.x,Math.min(px,w.x+w.width)),cy=Math.max(w.y,Math.min(py,w.y+w.height));
    return (cx-px)**2+(cy-py)**2<r15sq;
  });
  const segs=[],angles=[],E=0.0001;
  for(const w of nearby){
    const x1=w.x,y1=w.y,x2=w.x+w.width,y2=w.y+w.height;
    for(const[ax,ay,bx,by]of[[x1,y1,x2,y1],[x2,y1,x2,y2],[x2,y2,x1,y2],[x1,y2,x1,y1]]){
      segs.push({ax,ay,bx,by});
      for(const a of circleAngles(px,py,radius,ax,ay,bx,by))angles.push(a-E,a,a+E);
    }
    for(const[cx,cy]of[[x1,y1],[x2,y1],[x1,y2],[x2,y2]]){const a=Math.atan2(cy-py,cx-px);angles.push(a-E,a,a+E);}
  }
  for(let i=0;i<24;i++)angles.push(-Math.PI+(i/24)*Math.PI*2);
  const pts=[];
  for(const angle of angles){
    const ddx=Math.cos(angle),ddy=Math.sin(angle);let minT=radius;
    for(const s of segs){const t=raySegT(px,py,ddx,ddy,s.ax,s.ay,s.bx,s.by);if(t!==null&&t>0&&t<minT)minT=t;}
    pts.push({angle,x:px+ddx*minT,y:py+ddy*minT});
  }
  pts.sort((a,b)=>a.angle-b.angle);
  return pts;
}
// OLD — no circle intersections
function computePolyOld(px,py,radius,walls){
  const r15sq=radius*radius*2.25;
  const nearby=walls.filter(w=>{
    const cx=Math.max(w.x,Math.min(px,w.x+w.width)),cy=Math.max(w.y,Math.min(py,w.y+w.height));
    return (cx-px)**2+(cy-py)**2<r15sq;
  });
  const segs=[],angles=[],E=0.0001;
  for(const w of nearby){
    const x1=w.x,y1=w.y,x2=w.x+w.width,y2=w.y+w.height;
    for(const[ax,ay,bx,by]of[[x1,y1,x2,y1],[x2,y1,x2,y2],[x2,y2,x1,y2],[x1,y2,x1,y1]])segs.push({ax,ay,bx,by});
    for(const[cx,cy]of[[x1,y1],[x2,y1],[x1,y2],[x2,y2]]){const a=Math.atan2(cy-py,cx-px);angles.push(a-E,a,a+E);}
  }
  for(let i=0;i<36;i++)angles.push(-Math.PI+(i/36)*Math.PI*2);
  const pts=[];
  for(const angle of angles){
    const ddx=Math.cos(angle),ddy=Math.sin(angle);let minT=radius;
    for(const s of segs){const t=raySegT(px,py,ddx,ddy,s.ax,s.ay,s.bx,s.by);if(t!==null&&t>0&&t<minT)minT=t;}
    pts.push({angle,x:px+ddx*minT,y:py+ddy*minT});
  }
  pts.sort((a,b)=>a.angle-b.angle);
  return pts;
}

// ── Render one game-sized panel ───────────────────────────────────────────────
// Mirrors renderFogCanvas() exactly: zoom, world-to-screen projection, gradient, even-odd fill.
function renderGamePanel(cv, mapImg, poly) {
  const ctx = cv.getContext('2d');
  const zoom = CAMERA_ZOOM;
  const px = PLAYER.x, py = PLAYER.y;

  // Camera worldView: centred on player
  const viewW = GAME_W / zoom, viewH = GAME_H / zoom;
  const camX = px - viewW / 2, camY = py - viewH / 2;

  // Draw map background: source from map image, scaled by zoom
  // Source rect (world coords = map pixels at 1:1)
  ctx.drawImage(mapImg,
    Math.round(camX), Math.round(camY), Math.round(viewW), Math.round(viewH),
    0, 0, GAME_W, GAME_H
  );

  // Screen position of player
  const sx = (px - camX) * zoom;  // = GAME_W/2
  const sy = (py - camY) * zoom;  // = GAME_H/2
  const visionR = CREW_VISION * zoom;

  // World → screen
  const toSx = wx => (wx - camX) * zoom;
  const toSy = wy => (wy - camY) * zoom;

  // Fog composite (exact mirror of renderFogCanvas)
  const fog = document.createElement('canvas');
  fog.width = GAME_W; fog.height = GAME_H;
  const fc = fog.getContext('2d');

  // Step 1: full darkness
  fc.fillStyle = 'rgba(10,10,10,0.96)';
  fc.fillRect(0, 0, GAME_W, GAME_H);

  // Step 2: cut circular gradient hole
  fc.globalCompositeOperation = 'destination-out';
  const g = fc.createRadialGradient(sx, sy, 0, sx, sy, visionR * 1.2);
  g.addColorStop(0, 'rgba(0,0,0,1)');
  g.addColorStop(0.60, 'rgba(0,0,0,1)');
  g.addColorStop(1.0, 'rgba(0,0,0,0)');
  fc.fillStyle = g;
  fc.fillRect(0, 0, GAME_W, GAME_H);

  // Step 3: re-darken wall shadows via even-odd fill
  if (poly.length >= 3) {
    fc.globalCompositeOperation = 'source-over';
    fc.fillStyle = 'rgba(10,10,10,0.97)';
    fc.beginPath();
    fc.rect(0, 0, GAME_W, GAME_H);
    fc.moveTo(toSx(poly[0].x), toSy(poly[0].y));
    for (let i = 1; i < poly.length; i++) fc.lineTo(toSx(poly[i].x), toSy(poly[i].y));
    fc.closePath();
    fc.fill('evenodd');
  }

  ctx.drawImage(fog, 0, 0);

  // Player dot
  ctx.beginPath();
  ctx.arc(sx, sy, 6, 0, Math.PI*2);
  ctx.fillStyle = '#00ff66';
  ctx.fill();
}

// ── Load map image and render ─────────────────────────────────────────────────
const SCALE = 0.42; // display scale factor (so panels fit on screen)
const DW = Math.round(GAME_W * SCALE);
const DH = Math.round(GAME_H * SCALE);

const polyNew = computePoly(PLAYER.x, PLAYER.y, CREW_VISION, WALLS);
const polyOld = computePolyOld(PLAYER.x, PLAYER.y, CREW_VISION, WALLS);

const configs = [
  { label: `NEW (${polyNew.length} rays) — with circle-edge intersections`, poly: polyNew, color: '#4f4' },
  { label: `OLD (${polyOld.length} rays) — corners only`, poly: polyOld, color: '#f84' },
];

const img = new Image();
img.onload = () => {
  for (const { label, poly, color } of configs) {
    // Full-size offscreen canvas for game-accurate render
    const offscreen = document.createElement('canvas');
    offscreen.width = GAME_W; offscreen.height = GAME_H;
    renderGamePanel(offscreen, img, poly);

    // Display canvas (scaled down to fit)
    const cv = document.createElement('canvas');
    cv.width = DW; cv.height = DH;
    cv.getContext('2d').drawImage(offscreen, 0, 0, DW, DH);

    const div = document.createElement('div'); div.className = 'panel';
    const h = document.createElement('h3');
    h.textContent = label; h.style.color = color;
    div.append(h, cv);
    document.body.append(div);
  }
};
img.onerror = () => {
  document.body.innerHTML += '<p style="color:red">Map image failed to load — try refreshing</p>';
};
img.src = '/Assets/Maps/map2back.png';
</script>
</body>
</html>

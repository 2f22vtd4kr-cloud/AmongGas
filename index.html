<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>Among Gas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    canvas {
      display: block;
      margin: 0 auto;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a0a2e;
      color: #fff;
      font-family: sans-serif;
      z-index: 999;
    }
    #loading h1 { font-size: 2rem; margin-bottom: 1rem; color: #c084fc; }
    #loading-bar-bg {
      width: 300px; height: 20px;
      background: #333; border-radius: 10px; overflow: hidden;
    }
    #loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7c3aed, #c084fc);
      transition: width 0.2s ease;
      border-radius: 10px;
    }
    #loading p { margin-top: 0.5rem; font-size: 0.85rem; color: #aaa; }
  </style>
</head>
<body>
  <div id="loading">
    <h1>Among Gas</h1>
    <div id="loading-bar-bg"><div id="loading-bar"></div></div>
    <p id="loading-text">Loading…</p>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

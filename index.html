<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>Among Gas</title>
  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    /* Stretch the game canvas to fill the full viewport edge-to-edge
       instead of Phaser's own FIT letterboxing/pillarboxing, which left
       black bars whenever the device aspect ratio didn't exactly match
       the game's fixed 750x1334 design resolution. This is a pure CSS
       stretch — the game's internal design resolution is unchanged, so
       every HUD element keeps the exact on-screen size it was tuned for;
       only the rendered canvas is scaled (slightly non-uniformly) to
       cover the whole screen. */
    #game-container {
      width: 100%;
      height: 100%;
    }
    #game-container canvas {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
    }
    /* Portrait-only rotate prompt — shown only when in landscape on mobile */
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      text-align: center;
      padding: 2rem;
      gap: 1rem;
    }
    #rotate-prompt span { font-size: 3rem; }
    @media screen and (max-height: 500px) and (orientation: landscape) {
      #rotate-prompt { display: flex; }
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a0a2e;
      color: #fff;
      font-family: sans-serif;
      z-index: 999;
    }
    #loading h1 { font-size: 2rem; margin-bottom: 1rem; color: #c084fc; }
    #loading-bar-bg {
      width: 300px; height: 20px;
      background: #333; border-radius: 10px; overflow: hidden;
    }
    #loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7c3aed, #c084fc);
      transition: width 0.2s ease;
      border-radius: 10px;
    }
    #loading p { margin-top: 0.5rem; font-size: 0.85rem; color: #aaa; }
  </style>
</head>
<body>
  <div id="rotate-prompt">
    <span>🔄</span>
    <p>Please rotate your device to portrait mode to play Among Gas.</p>
  </div>
  <div id="loading">
    <h1>Among Gas</h1>
    <div id="loading-bar-bg"><div id="loading-bar"></div></div>
    <p id="loading-text">Loading…</p>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

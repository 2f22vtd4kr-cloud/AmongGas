<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Among Gas</title>
  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* background-color is set explicitly so iOS Safari picks it up for
         the top/bottom browser chrome strips (Safari ignores theme-color
         and uses the computed background-color instead). We use
         background-image for the gradient — NOT the background shorthand —
         because the shorthand resets background-color to transparent,
         which would make Safari show white chrome again. */
      background-color: #000000;
      background-image: radial-gradient(ellipse at 50% 30%, #241143 0%, #140826 55%, #0a0416 100%);
      touch-action: none;
    }
    /* We deliberately do NOT force the canvas to 100%/100% here. Every HUD
       element (buttons, fonts, panels, task arrows) is hand-tuned in
       literal pixels against the game's fixed 750x1334 design resolution,
       and Phaser's Scale.FIT already scales that canvas up UNIFORMLY
       (same factor on both axes) to be as large as possible while staying
       centered on screen — this preserves every circle/icon's correct
       aspect ratio and keeps the task-arrow inset margins accurate.
       Forcing independent width:100%/height:100% stretches the two axes by
       different amounts whenever the device aspect ratio isn't exactly
       750:1334, which is what deformed circular buttons into ovals. A
       "cover" crop (scale up until there are truly zero bars) was also
       ruled out: on real phone aspect ratios it would crop 60-90+ virtual
       pixels off the sides of the design canvas, cutting directly into the
       corner-anchored HUD buttons (emergency, kill/report/use, minimap).
       So we keep Phaser's own uniform, non-cropping FIT centering, and
       only close the visual gap by matching the surrounding page
       background to the game's own space palette above. */
    #game-container canvas {
      display: block;
      margin: 0 auto;
    }
    /* Portrait-only rotate prompt — shown only when in landscape on mobile */
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      text-align: center;
      padding: 2rem;
      gap: 1rem;
    }
    #rotate-prompt span { font-size: 3rem; }
    @media screen and (max-height: 500px) and (orientation: landscape) {
      #rotate-prompt { display: flex; }
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a0a2e;
      color: #fff;
      font-family: sans-serif;
      z-index: 999;
    }
    #loading h1 { font-size: 2rem; margin-bottom: 1rem; color: #c084fc; }
    #loading-bar-bg {
      width: 300px; height: 20px;
      background: #333; border-radius: 10px; overflow: hidden;
    }
    #loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7c3aed, #c084fc);
      transition: width 0.2s ease;
      border-radius: 10px;
    }
    #loading p { margin-top: 0.5rem; font-size: 0.85rem; color: #aaa; }
  </style>
</head>
<body>
  <div id="rotate-prompt">
    <span>🔄</span>
    <p>Please rotate your device to portrait mode to play Among Gas.</p>
  </div>
  <div id="loading">
    <h1>Among Gas</h1>
    <div id="loading-bar-bg"><div id="loading-bar"></div></div>
    <p id="loading-text">Loading…</p>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
